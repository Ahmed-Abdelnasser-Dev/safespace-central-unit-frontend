<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SafeSpace-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safe Space - Monitoring Dashboard</title>
    <!-- Pre-paint theme restore: prevents light-mode FOUC -->
    <script>
      (function () {
        var stored = localStorage.getItem('safespace-theme');
        // Default to dark if no preference has been saved
        if (stored !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
