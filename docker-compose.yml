services:
  frontend:
    build:
      context: .
      args:
        # VITE_API_URL is baked into the JS bundle at build time.
        # The default /api works with the DMZ reverse proxy (same-origin mode).
        # Override at build time only if you are NOT using the built-in proxy.
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: safespace-dmz-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      # Runtime: injected into nginx at container start via envsubst templates.
      # These variables are substituted into deploy/nginx/default.conf.template.
      BACKEND_HOST: ${BACKEND_HOST:?BACKEND_HOST must be set in .env}
      BACKEND_PORT: ${BACKEND_PORT:-5000}
      STREAM_HOST: ${STREAM_HOST:-${BACKEND_HOST}}
      STREAM_PORT: ${STREAM_PORT:-4001}
      # Restrict envsubst to our custom vars only; leaves nginx $uri/$host/etc. intact.
      NGINX_ENVSUBST_FILTER: ${NGINX_ENVSUBST_FILTER:-^(BACKEND_|STREAM_)}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
